name: ci

on:
  push:
  pull_request:

jobs:
  dod:
    name: Definition of Done
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build / test / clippy / fmt / doc
        run: |
          # Default features = louke's prod-light config (its CI scanner is gated behind the
          # non-default `audit` feature). Build + lint that config on its own so an unused
          # item/import when `audit` is OFF fails here, not silently in a downstream prod build.
          cargo build --workspace
          cargo clippy --all-targets -- -D warnings
          # Doc the default (prod-light) config too: a crate-level doc must not intra-doc-link a
          # feature-gated item (it would break docs.rs, which builds default features).
          RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
          # --all-features turns ON louke/audit so the gated probe-coverage scanner tests
          # actually RUN — a plain `--workspace` would cfg them out and silently skip them.
          # TIANHENG_WORKSPACE_TESTS=1 makes the workspace-dependent dogfood/dispatch tests
          # fail loud if the workspace manifest is ever absent here (never silently skip in CI).
          TIANHENG_WORKSPACE_TESTS=1 cargo test --workspace --all-features
          cargo clippy --all-targets --all-features -- -D warnings
          cargo fmt --all --check
          RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --all-features

  msrv:
    name: MSRV (rust-version)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build and test on the declared minimum supported Rust version
        run: |
          msrv="$(cargo metadata --no-deps --format-version 1 \
            | sed -n 's/.*"rust_version":"\([^"]*\)".*/\1/p' | head -n1)"
          echo "declared rust-version: ${msrv:?could not read rust-version}"
          rustup toolchain install "$msrv" --profile minimal --no-self-update
          cargo "+$msrv" build --workspace
          # --all-features so the gated CI-scanner tests run on the MSRV toolchain too;
          # TIANHENG_WORKSPACE_TESTS=1 so a missing workspace manifest fails loud, never skips.
          TIANHENG_WORKSPACE_TESTS=1 cargo "+$msrv" test --workspace --all-features

  license-files:
    name: License texts bundled
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: every publishable crate bundles its license texts
        run: |
          # `cargo publish` packages only files inside each crate's own directory, so the
          # workspace-root LICENSE-* files and the inherited SPDX `license` field are NOT enough:
          # each publishable crate must physically carry its license texts or it ships without
          # them (a packaging defect latent in 0.1.0/0.1.1). This is release hygiene, not
          # architectural drift, so it is a CI reaction here — not a Tianheng boundary. Catch a
          # new crate that forgets the texts before it is ever published.
          missing=0
          for manifest in crates/*/Cargo.toml; do
            dir="${manifest%/Cargo.toml}"
            if grep -qE '^[[:space:]]*publish[[:space:]]*=[[:space:]]*false' "$manifest"; then
              continue  # not published — its directory need not carry license texts
            fi
            for f in LICENSE-MIT LICENSE-APACHE; do
              if [ ! -s "$dir/$f" ]; then
                echo "::error file=$dir/$f::$dir is missing $f — cargo publish ships only crate-local files, so the crate would publish without its license text (the SPDX license field is not enough)"
                missing=1
              fi
            done
          done
          exit "$missing"

  supply-chain:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: license / advisory / bans / sources policy
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  reaction:
    name: Tianheng reaction
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: reaction passes on a clean target
        run: cargo run -p tianheng -- check --manifest-path crates/tianheng/tests/fixtures/clean/Cargo.toml
      - name: reaction fails with exit 1 on a violating target (1, not 2 — the contract separates them)
        run: |
          status=0
          cargo run -p tianheng -- check --manifest-path crates/tianheng/tests/fixtures/violating/Cargo.toml || status=$?
          if [ "$status" -ne 1 ]; then
            echo "::error::violating fixture must react with exit 1 (enforced violation), got $status"
            exit 1
          fi
      - name: the SARIF projection is valid and still reacts with exit 1
        run: |
          status=0
          out=$(cargo run -q -p tianheng -- check --manifest-path crates/tianheng/tests/fixtures/violating/Cargo.toml --format sarif) || status=$?
          printf '%s\n' "$out"
          printf '%s' "$out" | grep -q '"version": "2.1.0"' \
            || { echo "::error::--format sarif did not emit a SARIF 2.1.0 document"; exit 1; }
          if [ "$status" -ne 1 ]; then
            echo "::error::--format sarif must still react with exit 1 on a violation, got $status"
            exit 1
          fi
