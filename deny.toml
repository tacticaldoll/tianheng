# cargo-deny supply-chain policy — Tianheng gates its own dependency surface, the same
# spirit as `crates/tianheng/tests/self_governance.rs`. This file is repo tooling (it
# lives at the workspace root, outside the crates, so it is never packaged).
#
# Run: `cargo deny check`. Wired into CI as the `supply-chain` job.

[advisories]
version = 2
# Deny known-vulnerable and yanked crates (RUSTSEC). No ignores: a real advisory must be
# fixed or consciously ignored here with a rationale, never silently.
ignore = []

[licenses]
version = 2
# Every license below is present in the actual dependency graph (all permissive):
#   MIT / Apache-2.0      — xuanji, guibiao, tianheng, hunyi, serde_json, serde_core,
#                           itoa, ryu, and 渾儀's AST stack: syn, proc-macro2, quote
#   Unlicense             — memchr (dual Unlicense OR MIT)
#   Unicode-3.0           — unicode-ident (licensed `(MIT OR Apache-2.0) AND Unicode-3.0`,
#                           pulled by syn): the Unicode data tables it embeds carry the
#                           permissive Unicode license, which the SPDX `AND` requires us to
#                           accept explicitly. Reviewed and accepted — it ships no code we
#                           author, only Unicode's own character-class data.
# Adding a dependency under any other license fails CI until it is reviewed here.
allow = ["MIT", "Apache-2.0", "Unlicense", "Unicode-3.0"]
confidence-threshold = 0.9

[bans]
# New external dependencies are already governed by Tianheng's own reaction (the 圭表
# core is serde_json-only; see self_governance.rs); here we only flag accidental
# duplicate versions so the tiny tree stays tidy.
multiple-versions = "warn"

[sources]
# This section owns resolved / whole-graph source provenance — what the build *actually* pulls
# from after the lockfile and [patch]/[source] replace-with, so a [patch]->git redirect surfaces
# here. Tianheng's crate-source-boundary governs the complementary *declared*, per-target source
# kind (manifest hygiene / publishability; sees optional-git, blind to [patch] by design). The
# division is deliberate — resolved is cargo-deny's lane, declared is Tianheng's — which is why
# resolved build-provenance (would-be capability B) is declined, not a Tianheng feature; see
# PROJECT.md. (Inverse of [bans] above, where Tianheng governs and cargo-deny only tidies.)
# Only crates.io and known git sources; an unknown registry/source fails loud.
unknown-registry = "deny"
unknown-git = "deny"
